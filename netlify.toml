[build]
  publish = "public"

# Proxy todas las llamadas /api/* al backend en Railway
# IMPORTANTE: reemplaza la URL con la de tu nueva app en Railway después de desplegar
[[redirects]]
  from   = "/api/*"
  to     = "https://lobo-barber-production.up.railway.app/api/:splat"
  status = 200
  force  = true
  headers = { X-From = "Netlify" }
